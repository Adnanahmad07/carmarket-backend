spring.application.name=carmarket

# PostgreSQL - Supabase (hardcoded for deployment)
spring.datasource.url=jdbc:postgresql://db.rzcmadlpnvnnunkxlmwn.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=YOUR_ACTUAL_PASSWORD_HERE

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Cloudinary
cloudinary.cloud-name=YOUR_CLOUD_NAME
cloudinary.api-key=YOUR_API_KEY
cloudinary.api-secret=YOUR_API_SECRET

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=40MB

server.port=8080