spring.application.name=carmarket

# PostgreSQL
spring.datasource.url=jdbc:postgresql://db.rzcmadlpnvnnunkxlmwn.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=YOUR_ACTUAL_PASSWORD

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - explicit settings for Hibernate 7
spring.jpa.database=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.jakarta.persistence.jdbc.url=jdbc:postgresql://db.rzcmadlpnvnnunkxlmwn.supabase.co:5432/postgres?sslmode=require

# Cloudinary
cloudinary.cloud-name=YOUR_CLOUD_NAME
cloudinary.api-key=YOUR_API_KEY
cloudinary.api-secret=YOUR_API_SECRET

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=40MB

server.port=8080